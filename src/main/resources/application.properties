spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ALTERADO: Atualizado para o dialeto moderno que atende ao Postgres 15+
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logs úteis para diagnosticar login em produção (Render)
logging.level.br.com.octopus.projectA.controller.AutenticacaoController=INFO
logging.level.br.com.octopus.projectA.security=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN